{{- if .Values.injector.enable }}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "dragonfly.fullname" . }}-injector-webhook
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    app: {{ template "dragonfly.fullname" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: injector
    app.kubernetes.io/name: dragonfly-injector
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    app: {{ template "dragonfly.fullname" . }}
    component: injector
    app.kubernetes.io/name: dragonfly-injector
    control-plane: controller-manager
---
{{- if .Values.injector.metrics.enable }}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "dragonfly.fullname" . }}-injector-metrics
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    app: {{ template "dragonfly.fullname" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: injector
    app.kubernetes.io/name: dragonfly-injector
    control-plane: controller-manager
spec:
  ports:
  - name: https
    port: {{ .Values.injector.metrics.service.port }}
    protocol: TCP
    targetPort: 8443
  selector:
    app: {{ template "dragonfly.fullname" . }}
    component: injector
    app.kubernetes.io/name: dragonfly-injector
    control-plane: controller-manager
{{- end }}
{{- end }}
