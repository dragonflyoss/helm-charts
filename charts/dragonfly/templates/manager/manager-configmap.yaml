{{- if .Values.manager.enable }}
{{- if not .Values.existingConfigSecret.name }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "dragonfly.manager.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    app: {{ template "dragonfly.fullname" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: {{ .Values.manager.name }}
data:
  manager.yaml: |-
    server:
      rest:
        addr: :{{ .Values.manager.restPort }}
        {{- if and .Values.manager.config.server.rest.tls.cert .Values.manager.config.server.rest.tls.key}}
        tls:
          cert: {{ .Values.manager.config.server.rest.tls.cert }}
          key: {{ .Values.manager.config.server.rest.tls.key }}
        {{- end }}
      grpc:
        advertiseIP: {{ .Values.manager.config.server.grpc.advertiseIP }}
        port:
          start: {{ .Values.manager.grpcPort }}
          end: {{ .Values.manager.grpcPort }}
        requestRateLimit: {{ .Values.manager.config.server.grpc.requestRateLimit }}
      {{- with .Values.manager.config.server.grpc.tls }}
      {{- if and . .caCert .cert .key }}
      tls:
        caCert: {{ .caCert }}
        cert: {{ .cert }}
        key: {{ .key }}
      {{- end }}
      {{- end }}
      workHome: {{ .Values.manager.config.server.workHome }}
      logLevel: {{ .Values.manager.config.server.logLevel }}
      logDir: {{ .Values.manager.config.server.logDir }}
      cacheDir: {{ .Values.manager.config.server.cacheDir }}
      pluginDir: {{ .Values.manager.config.server.pluginDir }}
    auth:
{{ toYaml .Values.manager.config.auth | indent 6 }}
    database:
      {{- if .Values.externalPostgres.enable }}
      {{- /* PostgreSQL configuration */}}
      postgres:
        {{- if .Values.externalPostgres.existingSecret.name }}
        {{- /* When using existingSecret, credentials will be injected via environment variables */}}
        {{- /* The manager binary should support DRAGONFLY_POSTGRES_* env vars for credential override */}}
        user: ${DRAGONFLY_POSTGRES_USER}
        password: ${DRAGONFLY_POSTGRES_PASSWORD}
        host: {{ if .Values.externalPostgres.existingSecret.hostKey }}${DRAGONFLY_POSTGRES_HOST}{{ else }}{{ .Values.externalPostgres.host }}{{ end }}
        port: {{ if .Values.externalPostgres.existingSecret.portKey }}${DRAGONFLY_POSTGRES_PORT}{{ else }}{{ .Values.externalPostgres.port }}{{ end }}
        dbname: {{ if .Values.externalPostgres.existingSecret.databaseKey }}${DRAGONFLY_POSTGRES_DBNAME}{{ else }}{{ .Values.externalPostgres.database }}{{ end }}
        sslMode: {{ if .Values.externalPostgres.existingSecret.sslModeKey }}${DRAGONFLY_POSTGRES_SSLMODE}{{ else }}{{ .Values.externalPostgres.sslMode }}{{ end }}
        migrate: {{ .Values.externalPostgres.migrate }}
        {{- else }}
        user: {{ .Values.externalPostgres.username }}
        password: {{ .Values.externalPostgres.password }}
        host: {{ .Values.externalPostgres.host }}
        port: {{ .Values.externalPostgres.port }}
        dbname: {{ .Values.externalPostgres.database }}
        sslMode: {{ .Values.externalPostgres.sslMode }}
        migrate: {{ .Values.externalPostgres.migrate }}
        {{- end }}
      {{- else }}
      {{- /* MySQL configuration (default) */}}
      mysql:
        {{- if and .Values.mysql.enable (empty .Values.externalMysql.host)}}
        user: {{ .Values.mysql.auth.username }}
        password: {{ .Values.mysql.auth.password }}
        host: {{ .Release.Name }}-{{ default "mysql" .Values.mysql.fullname }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}
        port: {{ .Values.mysql.primary.service.port }}
        dbname: {{ .Values.mysql.auth.database }}
        migrate: {{ .Values.mysql.migrate }}
        {{- else if .Values.externalMysql.existingSecret.name }}
        {{- /* When using existingSecret, credentials will be injected via environment variables */}}
        user: ${DRAGONFLY_MYSQL_USER}
        password: ${DRAGONFLY_MYSQL_PASSWORD}
        host: {{ if .Values.externalMysql.existingSecret.hostKey }}${DRAGONFLY_MYSQL_HOST}{{ else }}{{ .Values.externalMysql.host }}{{ end }}
        port: {{ if .Values.externalMysql.existingSecret.portKey }}${DRAGONFLY_MYSQL_PORT}{{ else }}{{ .Values.externalMysql.port }}{{ end }}
        dbname: {{ if .Values.externalMysql.existingSecret.databaseKey }}${DRAGONFLY_MYSQL_DBNAME}{{ else }}{{ .Values.externalMysql.database }}{{ end }}
        migrate: {{ .Values.externalMysql.migrate }}
        {{- else }}
        user: {{ .Values.externalMysql.username }}
        password: {{ .Values.externalMysql.password }}
        host: {{ .Values.externalMysql.host }}
        port: {{ .Values.externalMysql.port }}
        dbname: {{ .Values.externalMysql.database }}
        migrate: {{ .Values.externalMysql.migrate }}
        {{- end }}
      {{- end }}
      redis:
        {{- if .Values.redis.enable }}
        addrs:
        - {{ .Release.Name }}-{{ default "redis" .Values.redis.fullname }}-master.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}:{{ .Values.redis.master.service.ports.redis }}
        password: {{ .Values.redis.auth.password }}
        {{- else if .Values.externalRedis.existingSecret.name }}
        addrs:
{{ toYaml .Values.externalRedis.addrs | indent 10 }}
        masterName: {{ .Values.externalRedis.masterName }}
        username: {{ if .Values.externalRedis.existingSecret.usernameKey }}${DRAGONFLY_REDIS_USERNAME}{{ else }}{{ .Values.externalRedis.username }}{{ end }}
        password: ${DRAGONFLY_REDIS_PASSWORD}
        sentinelUsername: {{ if .Values.externalRedis.existingSecret.sentinelUsernameKey }}${DRAGONFLY_REDIS_SENTINEL_USERNAME}{{ else }}{{ .Values.externalRedis.sentinelUsername }}{{ end }}
        sentinelPassword: {{ if .Values.externalRedis.existingSecret.sentinelPasswordKey }}${DRAGONFLY_REDIS_SENTINEL_PASSWORD}{{ else }}{{ .Values.externalRedis.sentinelPassword }}{{ end }}
        db: {{ .Values.externalRedis.db }}
        brokerDB: {{ .Values.externalRedis.brokerDB }}
        backendDB: {{ .Values.externalRedis.backendDB }}
        {{- else }}
        addrs:
{{ toYaml .Values.externalRedis.addrs | indent 10 }}
        masterName: {{ .Values.externalRedis.masterName }}
        username: {{ .Values.externalRedis.username }}
        password: {{ .Values.externalRedis.password }}
        sentinelUsername: {{ .Values.externalRedis.sentinelUsername }}
        sentinelPassword: {{ .Values.externalRedis.sentinelPassword }}
        db: {{ .Values.externalRedis.db }}
        brokerDB: {{ .Values.externalRedis.brokerDB }}
        backendDB: {{ .Values.externalRedis.backendDB }}
        {{- end }}
    cache:
{{ toYaml .Values.manager.config.cache | indent 6 }}
    job:
{{ toYaml .Values.manager.config.job | indent 6 }}
    network:
{{ toYaml .Values.manager.config.network | indent 6 }}
    metrics:
      enable: {{ .Values.manager.metrics.enable }}
      addr: ":8000"
    console: {{ .Values.manager.config.console }}
    pprofPort: {{ .Values.manager.config.pprofPort }}
    tracing:
{{ toYaml .Values.manager.config.tracing | indent 6 }}
{{- end }}
{{- end }}
