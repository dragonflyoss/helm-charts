{{- if .Values.manager.enable }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ template "dragonfly.fullname" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: {{ .Values.manager.name }}
  name: {{ template "dragonfly.manager.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
  {{- if .Values.manager.deploymentAnnotations }}
{{ toYaml .Values.manager.deploymentAnnotations | indent 4 }}
  {{- end }}
spec:
  {{- if .Values.manager.updateStrategy }}
  strategy: {{- toYaml .Values.manager.updateStrategy | nindent 4 }}
  {{- end }}
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      app: {{ template "dragonfly.fullname" . }}
      component: {{ .Values.manager.name }}
  template:
    metadata:
      labels:
        app: {{ template "dragonfly.fullname" . }}
        component: {{ .Values.manager.name }}
        {{- if .Values.manager.podLabels }}
{{ toYaml .Values.manager.podLabels | indent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.existingConfigSecret.enabled }}
        checksum/secret: {{ .Values.existingConfigSecret.name | sha256sum }}
        {{- else }}
        checksum/config: {{ include (print $.Template.BasePath "/manager/manager-configmap.yaml") . | sha256sum }}
        {{- end }}
      {{- if .Values.manager.podAnnotations }}
{{ toYaml .Values.manager.podAnnotations | indent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.manager.hostNetwork }}
      {{- if .Values.manager.hostNetwork }}
      dnsPolicy: "ClusterFirstWithHostNet"
      {{- end }}
      {{- with .Values.manager.nodeSelector | default .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.manager.tolerations }}
      tolerations:
{{ toYaml .Values.manager.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.manager.affinity }}
      affinity:
{{ toYaml .Values.manager.affinity | indent 8 }}
      {{- end }}
      {{- if quote .Values.manager.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.manager.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if .Values.manager.priorityClassName }}
      priorityClassName: {{ .Values.manager.priorityClassName }}
      {{- end }}
      {{- with .Values.manager.image.pullSecrets | default .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.manager.hostAliases }}
      hostAliases:
{{ toYaml .Values.manager.hostAliases | indent 8 }}
      {{- end }}
      {{- if or .Values.redis.enable .Values.mysql.enable }}
      initContainers:
      {{- if .Values.redis.enable }}
      - name: wait-for-redis
        image: {{ template "manager.initContainer.image" . }}
        imagePullPolicy: {{ .Values.manager.initContainer.image.pullPolicy }}
        command: ['sh', '-c', 'until nslookup {{ .Release.Name }}-{{ default "redis" .Values.redis.fullname }}-master.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }} && nc -vz {{ .Release.Name }}-{{ default "redis" .Values.redis.fullname }}-master.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }} {{ .Values.redis.master.service.ports.redis }}; do echo waiting for redis; sleep 2; done;']
        resources:
{{ toYaml .Values.manager.initContainer.resources | indent 10 }}
      {{- end }}
      {{- if .Values.mysql.enable }}
      - name: wait-for-mysql
        image: {{ template "manager.initContainer.image" . }}
        imagePullPolicy: {{ .Values.manager.initContainer.image.pullPolicy }}
        command: ['sh', '-c', 'until nslookup {{ .Release.Name }}-{{ default "mysql" .Values.mysql.fullname }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }} && nc -vz {{ .Release.Name }}-{{ default "mysql" .Values.mysql.fullname }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }} {{ .Values.mysql.primary.service.port }}; do echo waiting for mysql; sleep 2; done;']
        resources:
{{ toYaml .Values.manager.initContainer.resources | indent 10 }}
      {{- end }}
      {{- end }}
      containers:
      - name: manager
        image: {{ template "manager.image" . }}
        imagePullPolicy: {{ .Values.manager.image.pullPolicy | quote }}
        resources:
{{ toYaml .Values.manager.resources | indent 10 }}
        env:
        {{- if .Values.manager.maxProcs }}
        - name: GOMAXPROCS
          value: {{ .Values.manager.maxProcs }}
        {{- end }}
        {{- /* PostgreSQL secret environment variables */}}
        {{- if and .Values.externalPostgres.enable .Values.externalPostgres.existingSecret.enabled .Values.externalPostgres.existingSecret.name }}
        - name: DRAGONFLY_POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalPostgres.existingSecret.name }}
              key: {{ .Values.externalPostgres.existingSecret.usernameKey }}
        - name: DRAGONFLY_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalPostgres.existingSecret.name }}
              key: {{ .Values.externalPostgres.existingSecret.passwordKey }}
        {{- if .Values.externalPostgres.existingSecret.hostKey }}
        - name: DRAGONFLY_POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalPostgres.existingSecret.name }}
              key: {{ .Values.externalPostgres.existingSecret.hostKey }}
        {{- end }}
        {{- if .Values.externalPostgres.existingSecret.portKey }}
        - name: DRAGONFLY_POSTGRES_PORT
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalPostgres.existingSecret.name }}
              key: {{ .Values.externalPostgres.existingSecret.portKey }}
        {{- end }}
        {{- if .Values.externalPostgres.existingSecret.databaseKey }}
        - name: DRAGONFLY_POSTGRES_DBNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalPostgres.existingSecret.name }}
              key: {{ .Values.externalPostgres.existingSecret.databaseKey }}
        {{- end }}
        {{- if .Values.externalPostgres.existingSecret.sslModeKey }}
        - name: DRAGONFLY_POSTGRES_SSLMODE
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalPostgres.existingSecret.name }}
              key: {{ .Values.externalPostgres.existingSecret.sslModeKey }}
        {{- end }}
        {{- end }}
        {{- /* MySQL secret environment variables */}}
        {{- if and (not .Values.externalPostgres.enable) .Values.externalMysql.existingSecret.enabled .Values.externalMysql.existingSecret.name }}
        - name: DRAGONFLY_MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalMysql.existingSecret.name }}
              key: {{ .Values.externalMysql.existingSecret.usernameKey }}
        - name: DRAGONFLY_MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalMysql.existingSecret.name }}
              key: {{ .Values.externalMysql.existingSecret.passwordKey }}
        {{- if .Values.externalMysql.existingSecret.hostKey }}
        - name: DRAGONFLY_MYSQL_HOST
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalMysql.existingSecret.name }}
              key: {{ .Values.externalMysql.existingSecret.hostKey }}
        {{- end }}
        {{- if .Values.externalMysql.existingSecret.portKey }}
        - name: DRAGONFLY_MYSQL_PORT
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalMysql.existingSecret.name }}
              key: {{ .Values.externalMysql.existingSecret.portKey }}
        {{- end }}
        {{- if .Values.externalMysql.existingSecret.databaseKey }}
        - name: DRAGONFLY_MYSQL_DBNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalMysql.existingSecret.name }}
              key: {{ .Values.externalMysql.existingSecret.databaseKey }}
        {{- end }}
        {{- end }}
        {{- /* Redis secret environment variables */}}
        {{- if and (not .Values.redis.enable) .Values.externalRedis.existingSecret.enabled .Values.externalRedis.existingSecret.name }}
        - name: DRAGONFLY_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalRedis.existingSecret.name }}
              key: {{ .Values.externalRedis.existingSecret.passwordKey }}
        {{- if .Values.externalRedis.existingSecret.usernameKey }}
        - name: DRAGONFLY_REDIS_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalRedis.existingSecret.name }}
              key: {{ .Values.externalRedis.existingSecret.usernameKey }}
        {{- end }}
        {{- if .Values.externalRedis.existingSecret.sentinelPasswordKey }}
        - name: DRAGONFLY_REDIS_SENTINEL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalRedis.existingSecret.name }}
              key: {{ .Values.externalRedis.existingSecret.sentinelPasswordKey }}
        {{- end }}
        {{- if .Values.externalRedis.existingSecret.sentinelUsernameKey }}
        - name: DRAGONFLY_REDIS_SENTINEL_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalRedis.existingSecret.name }}
              key: {{ .Values.externalRedis.existingSecret.sentinelUsernameKey }}
        {{- end }}
        {{- end }}
        {{- /* Override config path when using existingConfigSecret */}}
        {{- if .Values.existingConfigSecret.enabled }}
        - name: MANAGER_CONFIG
          value: "/etc/dragonfly/{{ .Values.existingConfigSecret.key }}"
        {{- end }}
        {{- if .Values.manager.extraEnvVars }}
        {{- include "common.tplvalues.render" (dict "value" .Values.manager.extraEnvVars "context" $) | nindent 8 }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.manager.restPort }}
          protocol: TCP
        - containerPort: {{ .Values.manager.grpcPort }}
          protocol: TCP
        {{- if .Values.manager.metrics.enable }}
        - containerPort: 8000
          protocol: TCP
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: "/etc/dragonfly"
        {{- if .Values.manager.extraVolumeMounts }}
        {{- toYaml .Values.manager.extraVolumeMounts | nindent 8 }}
        {{- end }}
        readinessProbe:
          exec:
            command: ["/bin/grpc_health_probe", "-addr=:{{ .Values.manager.grpcPort }}", "-connect-timeout=5s", "-rpc-timeout=5s"]
          initialDelaySeconds: 5
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        livenessProbe:
          exec:
            command: ["/bin/grpc_health_probe", "-addr=:{{ .Values.manager.grpcPort }}", "-connect-timeout=5s", "-rpc-timeout=5s"]
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5
      volumes:
      - name: config
        {{- if .Values.existingConfigSecret.enabled }}
        secret:
          secretName: {{ .Values.existingConfigSecret.name }}
          items:
          - key: {{ .Values.existingConfigSecret.key }}
            path: manager.yaml
        {{- else }}
        configMap:
          name: {{ template "dragonfly.manager.fullname" . }}
          items:
          - key: manager.yaml
            path: manager.yaml
        {{- end }}
      {{- if .Values.manager.extraVolumes }}
      {{- toYaml .Values.manager.extraVolumes | nindent 6 }}
      {{- end }}
{{- end }}
