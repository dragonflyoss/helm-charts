{{- if .Values.manager.enable }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ template "dragonfly.fullname" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: {{ .Values.manager.name }}
  name: {{ template "dragonfly.manager.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
  {{- if .Values.manager.deploymentAnnotations }}
{{ toYaml .Values.manager.deploymentAnnotations | indent 4 }}
  {{- end }}
spec:
  {{- if .Values.manager.updateStrategy }}
  strategy: {{- toYaml .Values.manager.updateStrategy | nindent 4 }}
  {{- end }}
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      app: {{ template "dragonfly.fullname" . }}
      component: {{ .Values.manager.name }}
  template:
    metadata:
      labels:
        app: {{ template "dragonfly.fullname" . }}
        component: {{ .Values.manager.name }}
        {{- if .Values.manager.podLabels }}
{{ toYaml .Values.manager.podLabels | indent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/manager/manager-configmap.yaml") . | sha256sum }}
      {{- if .Values.manager.podAnnotations }}
{{ toYaml .Values.manager.podAnnotations | indent 8 }}
      {{- end }}
    spec:
      hostNetwork: {{ .Values.manager.hostNetwork }}
      {{- if .Values.manager.hostNetwork }}
      dnsPolicy: "ClusterFirstWithHostNet"
      {{- end }}
      {{- with .Values.manager.nodeSelector | default .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.manager.tolerations }}
      tolerations:
{{ toYaml .Values.manager.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.manager.affinity }}
      affinity:
{{ toYaml .Values.manager.affinity | indent 8 }}
      {{- end }}
      {{- if quote .Values.manager.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.manager.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if .Values.manager.priorityClassName }}
      priorityClassName: {{ .Values.manager.priorityClassName }}
      {{- end }}
      {{- with .Values.manager.image.pullSecrets | default .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.manager.hostAliases }}
      hostAliases:
{{ toYaml .Values.manager.hostAliases | indent 8 }}
      {{- end }}
      initContainers:
      {{- if .Values.redis.enable }}
      - name: wait-for-redis
        image: {{ template "manager.initContainer.image" . }}
        imagePullPolicy: {{ .Values.manager.initContainer.image.pullPolicy }}
        command: ['sh', '-c', 'until nslookup {{ .Release.Name }}-{{ default "redis" .Values.redis.fullname }}-master.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }} && nc -vz {{ .Release.Name }}-{{ default "redis" .Values.redis.fullname }}-master.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }} {{ .Values.redis.master.service.ports.redis }}; do echo waiting for redis; sleep 2; done;']
        resources:
{{ toYaml .Values.manager.initContainer.resources | indent 10 }}
      {{- end }}
      {{- if .Values.mysql.enable }}
      - name: wait-for-mysql
        image: {{ template "manager.initContainer.image" . }}
        imagePullPolicy: {{ .Values.manager.initContainer.image.pullPolicy }}
        command: ['sh', '-c', 'until nslookup {{ .Release.Name }}-{{ default "mysql" .Values.mysql.fullname }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }} && nc -vz {{ .Release.Name }}-{{ default "mysql" .Values.mysql.fullname }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }} {{ .Values.mysql.primary.service.port }}; do echo waiting for mysql; sleep 2; done;']
        resources:
{{ toYaml .Values.manager.initContainer.resources | indent 10 }}
      {{- end }}
      - name: render-secrets
        image: {{ template "manager.image" . }}
        imagePullPolicy: {{ .Values.manager.image.pullPolicy | quote }}
        env:
        {{- if and .Values.mysql.enable (empty .Values.externalMysql.host) }}
        {{- if .Values.mysql.auth.existingSecret }}
        - name: DRAGONFLY_MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mysql.auth.existingSecret }}
              key: mysql-password
        {{- end }}
        {{- else if .Values.externalMysql.existingSecret }}
        - name: DRAGONFLY_MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalMysql.existingSecret }}
              key: {{ .Values.externalMysql.existingSecretPasswordKey }}
        {{- end }}
        {{- if .Values.redis.enable }}
        {{- if .Values.redis.auth.existingSecret }}
        - name: DRAGONFLY_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.auth.existingSecret }}
              key: {{ .Values.redis.auth.existingSecretPasswordKey | default "redis-password" }}
        {{- end }}
        {{- else if .Values.externalRedis.existingSecret }}
        - name: DRAGONFLY_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalRedis.existingSecret }}
              key: {{ .Values.externalRedis.existingSecretPasswordKey }}
        - name: DRAGONFLY_REDIS_SENTINEL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.externalRedis.existingSecret }}
              key: {{ .Values.externalRedis.existingSecretSentinelPasswordKey }}
        {{- end }}
        {{- if .Values.manager.config.auth.jwt.existingSecret }}
        - name: DRAGONFLY_JWT_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.manager.config.auth.jwt.existingSecret }}
              key: {{ .Values.manager.config.auth.jwt.existingSecretKeyKey }}
        {{- end }}
        command:
        - sh
        - -c
        - |
{{ include "dragonfly.renderSecretsScript" . | indent 10 }}
        resources:
{{ toYaml .Values.manager.initContainer.resources | indent 10 }}
        volumeMounts:
        - name: config-template
          mountPath: /dragonfly-config-template
          readOnly: true
        - name: config
          mountPath: /dragonfly-config
      containers:
      - name: manager
        image: {{ template "manager.image" . }}
        imagePullPolicy: {{ .Values.manager.image.pullPolicy | quote }}
        resources:
{{ toYaml .Values.manager.resources | indent 10 }}
        env:
        {{- if .Values.manager.maxProcs }}
        - name: GOMAXPROCS
          value: {{ .Values.manager.maxProcs }}
        {{- end }}
        {{- if .Values.manager.extraEnvVars }}
        {{- include "common.tplvalues.render" (dict "value" .Values.manager.extraEnvVars "context" $) | nindent 8 }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.manager.restPort }}
          protocol: TCP
        - containerPort: {{ .Values.manager.grpcPort }}
          protocol: TCP
        {{- if .Values.manager.metrics.enable }}
        - containerPort: 8000
          protocol: TCP
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: "/etc/dragonfly"
        {{- if .Values.manager.extraVolumeMounts }}
        {{- toYaml .Values.manager.extraVolumeMounts | nindent 8 }}
        {{- end }}
        {{- if .Values.startupProbe.enable }}
        startupProbe:
          exec:
            command: ["/bin/grpc_health_probe", "-addr=:{{ .Values.manager.grpcPort }}", "-connect-timeout={{ .Values.startupProbe.timeoutSeconds }}s", "-rpc-timeout={{ .Values.startupProbe.timeoutSeconds }}s"]
          initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
          successThreshold: {{ .Values.startupProbe.successThreshold }}
          failureThreshold: {{ .Values.startupProbe.failureThreshold }}
        {{- end }}
        readinessProbe:
          exec:
            command: ["/bin/grpc_health_probe", "-addr=:{{ .Values.manager.grpcPort }}", "-connect-timeout={{ .Values.readinessProbe.timeoutSeconds }}s", "-rpc-timeout={{ .Values.readinessProbe.timeoutSeconds }}s"]
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          successThreshold: {{ .Values.readinessProbe.successThreshold }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        livenessProbe:
          exec:
            command: ["/bin/grpc_health_probe", "-addr=:{{ .Values.manager.grpcPort }}", "-connect-timeout={{ .Values.livenessProbe.timeoutSeconds }}s", "-rpc-timeout={{ .Values.livenessProbe.timeoutSeconds }}s"]
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          successThreshold: {{ .Values.livenessProbe.successThreshold }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
      volumes:
      - name: config-template
        configMap:
          name: {{ template "dragonfly.manager.fullname" . }}
          items:
          - key: manager.yaml
            path: manager.yaml
      - name: config
        emptyDir: {}
      {{- if .Values.manager.extraVolumes }}
      {{- toYaml .Values.manager.extraVolumes | nindent 6 }}
      {{- end }}
{{- end }}
